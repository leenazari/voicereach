<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="24" y="10" width="16" height="24" rx="8" fill="white"/>
  <!-- Microphone arc -->
  <path d="M16 34 Q16 50 32 50 Q48 50 48 34" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Stand line -->
  <line x1="32" y1="50" x2="32" y2="58" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="22" y1="58" x2="42" y2="58" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
